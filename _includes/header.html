<header class="site-header">
  <div class="container">
    <div class="header-inner">

      <a href="{{ '/' | relative_url }}" class="site-logo">AVOCADOSAT<span>FILMS</span></a>

      <nav class="main-nav" aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a>
        <a href="{{ '/reviews/' | relative_url }}"{% if page.url contains '/reviews' %} class="active"{% endif %}>Reviews</a>
        <a href="{{ '/upcoming/' | relative_url }}"{% if page.url contains '/upcoming' %} class="active"{% endif %}>Upcoming</a>
        <a href="{{ '/categories/' | relative_url }}"{% if page.url contains '/categories' %} class="active"{% endif %}>Categories</a>
      </nav>

      <div class="header-right">
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="all" title="Show all languages">ALL</button>
          <button class="lang-btn" data-lang="en" title="English only">EN</button>
          <button class="lang-btn" data-lang="gr" title="Greek only">GR</button>
        </div>
        <div class="social-icons">
          {% if site.social.instagram != "" %}
          <a href="https://instagram.com/{{ site.social.instagram }}" target="_blank" rel="noopener" aria-label="Instagram">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
          </a>
          {% endif %}
          {% if site.social.youtube != "" %}
          <a href="https://youtube.com/{{ site.social.youtube }}" target="_blank" rel="noopener" aria-label="YouTube">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>
          </a>
          {% endif %}
          {% if site.social.tiktok != "" %}
          <a href="https://tiktok.com/@{{ site.social.tiktok }}" target="_blank" rel="noopener" aria-label="TikTok">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.26 8.26 0 004.84 1.56V6.81a4.85 4.85 0 01-1.07-.12z"/></svg>
          </a>
          {% endif %}
        </div>
        <button class="menu-toggle" aria-label="Open menu" aria-expanded="false">&#9776;</button>
      </div>

    </div>
  </div>

  <nav class="mobile-nav" id="mobileNav" aria-label="Mobile navigation">
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/reviews/' | relative_url }}">Reviews</a>
    <a href="{{ '/upcoming/' | relative_url }}">Upcoming</a>
    <a href="{{ '/categories/' | relative_url }}">Categories</a>
    <div class="mobile-nav-footer">
      <button class="lang-btn" data-lang="all">ALL</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="gr">GR</button>
    </div>
  </nav>
</header>
